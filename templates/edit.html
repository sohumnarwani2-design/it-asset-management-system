<!DOCTYPE html>
<html>
<head>
    <title>Edit Device</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 16px; }
        label { display: block; margin-top: 14px; font-weight: bold; font-size: 0.9em; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95em; }
        .error { color: red; background: #fee; padding: 8px; border-radius: 4px; margin-bottom: 12px; }
        button { margin-top: 18px; padding: 10px 24px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { display: inline-block; margin-top: 12px; color: #555; text-decoration: none; }
    </style>
</head>
<body>
<h2>Edit Device</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
    <label>Brand</label>
    <input type="text" name="name" value="{{ device.name }}" required>
    <label>Tag No</label>
    <input type="text" name="tag_no" value="{{ device.tag_no or '' }}">
    <label>Type</label>
    <input type="text" name="type" value="{{ device.type }}" required>
    <label>Config</label>
    <input type="text" name="config" value="{{ device.config or '' }}">
    <label>Serial Number</label>
    <input type="text" name="serial" value="{{ device.serial }}" required>
    <button type="submit">Save Changes</button>
</form>
<a href="/">← Back</a>
</body>
</html>
